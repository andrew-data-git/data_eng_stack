version: "3.9"
services:
  db:
    image: postgres:15
    container_name: weather_db
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  app:
    build: .
    container_name: weather_app
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app
    command: python main.py

volumes:
  pgdata: